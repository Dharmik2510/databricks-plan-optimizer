name: Auto-Assign Copilot

on:
  issues:
    types: [labeled]

jobs:
  assign-copilot:
    # Only run when both 'automated-remediation' and 'security' labels are present
    runs-on: ubuntu-latest
    permissions:
      issues: write
    if: |
      (github.event.label.name == 'automated-remediation' || github.event.label.name == 'security') &&
      contains(toJson(github.event.issue.labels), '"automated-remediation"') &&
      contains(toJson(github.event.issue.labels), '"security"')
    steps:
      - name: Assign to Copilot Agent
        uses: actions/github-script@v7
        with:
          # Uses GITHUB_TOKEN — already has issues: write from job permissions above.
          # No PAT or hardcoded node ID needed; copilot is assigned by its public username.
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              assignees: ['copilot']
            });
            console.log(`Assigned copilot to issue #${context.payload.issue.number}`);
