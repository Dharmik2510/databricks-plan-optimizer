name: Auto-Assign Copilot

on:
  issues:
    types: [labeled]

jobs:
  assign-copilot:
    # Only run when both 'automated-remediation' and 'security' labels are present on the issue
    permissions:
      issues: write
    if: |
      (github.event.label.name == 'automated-remediation' || github.event.label.name == 'security') &&
      contains(toJson(github.event.issue.labels), '"automated-remediation"') &&
      contains(toJson(github.event.issue.labels), '"security"')
    runs-on: ubuntu-latest
    steps:
      - name: Assign to Copilot Agent
        uses: actions/github-script@v7
        with:
          # COPILOT_ASSIGN_TOKEN must be a PAT or GitHub App token with 'issues: write' scope
          github-token: ${{ secrets.COPILOT_ASSIGN_TOKEN }}
          script: |
            const query = `
              mutation($id: ID!, $assigneeIds: [ID!]!) {
                addAssigneesToAssignable(input: {assignableId: $id, assigneeIds: $assigneeIds}) {
                  clientMutationId
                }
              }`;

            // Node ID for the copilot-swe-agent bot (obtained via GraphQL `user(login:"copilot-swe-agent"){id}`)
            // Update this value if the bot account changes.
            const copilotBotId = "U_kgDODB1VSw";

            const variables = {
              id: context.payload.issue.node_id,
              assigneeIds: [copilotBotId]
            };

            await github.graphql(query, variables);
